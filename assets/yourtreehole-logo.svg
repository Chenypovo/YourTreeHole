<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">YourTreeHole</title>
  <desc id="desc">An elegant forest-toned banner logo for YourTreeHole.</desc>
  <defs>
    <radialGradient id="warm-light" cx="72%" cy="18%" r="64%">
      <stop offset="0%" stop-color="#f0dfb8" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#7b5e3d" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06110d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09130f"/>
      <stop offset="48%" stop-color="#13251c"/>
      <stop offset="100%" stop-color="#231b13"/>
    </linearGradient>
    <linearGradient id="title-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7df"/>
      <stop offset="58%" stop-color="#ead7ad"/>
      <stop offset="100%" stop-color="#b89460"/>
    </linearGradient>
    <linearGradient id="hole" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3527"/>
      <stop offset="62%" stop-color="#092119"/>
      <stop offset="100%" stop-color="#050b09"/>
    </linearGradient>
    <filter id="title-shadow" x="-8%" y="-40%" width="116%" height="190%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="7" dy="8" stdDeviation="0" flood-color="#0a0d0b" flood-opacity="0.75"/>
    </filter>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="34" fill="url(#forest)"/>
  <rect x="22" y="22" width="1556" height="376" rx="28" fill="none" stroke="#e6d3ab" stroke-opacity="0.18" stroke-width="2"/>
  <rect width="1600" height="420" rx="34" fill="url(#warm-light)"/>

  <g opacity="0.5">
    <path d="M0 310 C210 252 390 303 552 264 C704 227 826 227 985 260 C1190 302 1350 270 1600 205 L1600 420 L0 420 Z" fill="#15271d"/>
    <path d="M76 315 C230 278 360 291 505 265 C650 239 786 228 958 262 C1138 298 1325 282 1518 226" fill="none" stroke="#d9c091" stroke-width="2" stroke-opacity="0.22"/>
  </g>

  <g transform="translate(118 72)">
    <circle cx="96" cy="106" r="74" fill="#173f30" opacity="0.82"/>
    <circle cx="96" cy="106" r="39" fill="url(#hole)"/>
    <path d="M96 36 C77 58 70 77 74 102 C77 128 71 151 54 172" fill="none" stroke="#e8d3a7" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
    <path d="M96 36 C117 62 123 84 119 108 C115 133 124 153 141 172" fill="none" stroke="#e8d3a7" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
    <path d="M66 74 C86 58 105 57 126 74" fill="none" stroke="#d7b673" stroke-width="8" stroke-linecap="round" opacity="0.74"/>
    <circle cx="96" cy="106" r="76" fill="#d8b979" opacity="0.12" filter="url(#soft-glow)"/>
  </g>

  <g transform="translate(270 92)">
    <text x="0" y="128"
          font-family="Georgia, 'Times New Roman', ui-serif, serif"
          font-size="118"
          font-weight="700"
          letter-spacing="1.5"
          fill="url(#title-fill)"
          filter="url(#title-shadow)">YourTreeHole</text>
    <text x="3" y="128"
          font-family="Georgia, 'Times New Roman', ui-serif, serif"
          font-size="118"
          font-weight="700"
          letter-spacing="1.5"
          fill="none"
          stroke="#fff4d3"
          stroke-width="1.2"
          stroke-opacity="0.28">YourTreeHole</text>

    <line x1="6" y1="176" x2="860" y2="176" stroke="#d8c194" stroke-width="2" stroke-opacity="0.28"/>
    <text x="6" y="226"
          font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="30"
          letter-spacing="1.2"
          fill="#d9c7a5"
          opacity="0.92">a private place for thoughts that should not be forgotten</text>
  </g>
</svg>
