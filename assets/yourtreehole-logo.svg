<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">YourTreeHole</title>
  <desc id="desc">A warm pixel-style YourTreeHole logo with soft shadows.</desc>
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11120f"/>
      <stop offset="52%" stop-color="#182018"/>
      <stop offset="100%" stop-color="#271a13"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe28a"/>
      <stop offset="49%" stop-color="#ffd25d"/>
      <stop offset="50%" stop-color="#c9863b"/>
      <stop offset="100%" stop-color="#a86831"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#4c2f1d" flood-opacity="0.9"/>
      <feDropShadow dx="20" dy="20" stdDeviation="0" flood-color="#15110d" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.75 0 0 0.58  0 0 0.35 0 0.18  0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1600" height="360" rx="28" fill="url(#night)"/>
  <path d="M0 260 C230 218 385 250 560 218 C730 188 838 185 982 216 C1160 254 1315 232 1600 184 L1600 360 L0 360 Z" fill="#1d2c21" opacity="0.55"/>
  <path d="M72 286 C190 256 264 270 360 252 C502 225 600 262 710 235 C882 194 972 216 1114 245 C1280 278 1400 248 1528 210" fill="none" stroke="#d6a65d" stroke-width="2" opacity="0.28"/>

  <g transform="translate(92 64)">
    <text x="0" y="132"
          font-family="Impact, Haettenschweiler, 'Arial Black', ui-sans-serif, system-ui, sans-serif"
          font-size="124"
          font-weight="900"
          letter-spacing="6"
          fill="none"
          stroke="#f6c34f"
          stroke-width="10"
          opacity="0.28">YourTreeHole</text>
    <text x="0" y="132"
          font-family="Impact, Haettenschweiler, 'Arial Black', ui-sans-serif, system-ui, sans-serif"
          font-size="124"
          font-weight="900"
          letter-spacing="6"
          fill="url(#letter)"
          stroke="#1b120c"
          stroke-width="3"
          paint-order="stroke fill"
          filter="url(#soft-shadow)">YourTreeHole</text>
    <text x="5" y="130"
          font-family="Impact, Haettenschweiler, 'Arial Black', ui-sans-serif, system-ui, sans-serif"
          font-size="124"
          font-weight="900"
          letter-spacing="6"
          fill="#fff1b6"
          opacity="0.18"
          filter="url(#glow)">YourTreeHole</text>

    <g transform="translate(12 180)">
      <rect x="0" y="0" width="50" height="50" rx="14" fill="#274f3d"/>
      <text x="25" y="35" text-anchor="middle" font-family="serif" font-size="34" font-weight="800" fill="#fff4cf">树</text>
      <text x="70" y="33" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" fill="#f5e8c7" letter-spacing="1">
        keep every small thought somewhere safe
      </text>
    </g>
  </g>
</svg>
