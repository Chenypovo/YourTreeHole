[llm]
# Public provider settings can live here.
# Keep API keys in .env, never in this tracked config file.
# base_url = "https://api.z.ai/api/coding/paas/v4"
# model = "glm-5.1"

[persona]
path = "persona.md"

[memory]
data_dir = "./data"
enable_gating = true
profile_update_interval = 5

[agent]

[ui]
show_input_rules = true
input_prompt = "❯ "
input_rule_color = "cyan"

[telegram]
enabled = false
# Fill this with your own numeric Telegram user id before enabling the bot.
# allowed_user_ids = [123456789]
allowed_user_ids = []
reply_mode = "final"
